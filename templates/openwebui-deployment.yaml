apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inhouse-ai.fullname" . }}-openwebui
  labels:
    {{- include "inhouse-ai.openwebui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.openwebui.replicas }}
  selector:
    matchLabels:
      {{- include "inhouse-ai.openwebui.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "inhouse-ai.openwebui.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: open-webui
          image: "{{ .Values.openwebui.image.repository }}:{{ .Values.openwebui.image.tag }}"
          imagePullPolicy: {{ .Values.openwebui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: OLLAMA_BASE_URL
              value: "http://{{ include "inhouse-ai.fullname" . }}-ollama:{{ .Values.ollama.service.port }}"
            {{- if .Values.litellm.enabled }}
            - name: OPENAI_API_BASE_URL
              value: "http://{{ include "inhouse-ai.fullname" . }}-litellm:{{ .Values.litellm.service.port }}/v1"
            - name: OPENAI_API_KEY
              value: {{ .Values.litellm.masterKey | default "not-needed" | quote }}
            - name: ENABLE_OPENAI_API
              value: "true"
            {{- else if .Values.externalProviders.anthropic.enabled }}
            - name: ENABLE_OPENAI_API
              value: "true"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalProviders.anthropic.secretName }}
                  key: {{ .Values.externalProviders.anthropic.secretKey }}
            {{- end }}
            {{- range $key, $val := .Values.openwebui.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.openwebui.resources | nindent 12 }}
          volumeMounts:
            - name: webui-data
              mountPath: /app/backend/data
      volumes:
        {{- if .Values.openwebui.persistence.enabled }}
        - name: webui-data
          persistentVolumeClaim:
            claimName: {{ include "inhouse-ai.fullname" . }}-openwebui
        {{- else }}
        - name: webui-data
          emptyDir: {}
        {{- end }}
