{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inhouse-ai.fullname" . }}-litellm
  labels:
    {{- include "inhouse-ai.litellm.labels" . | nindent 4 }}
spec:
  type: {{ .Values.litellm.service.type }}
  ports:
    - port: {{ .Values.litellm.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "inhouse-ai.litellm.selectorLabels" . | nindent 4 }}
{{- end }}
