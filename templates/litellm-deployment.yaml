{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inhouse-ai.fullname" . }}-litellm
  labels:
    {{- include "inhouse-ai.litellm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.litellm.replicas }}
  selector:
    matchLabels:
      {{- include "inhouse-ai.litellm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "inhouse-ai.litellm.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/litellm-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: litellm
          image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
          imagePullPolicy: {{ .Values.litellm.image.pullPolicy }}
          args:
            - "--config"
            - "/etc/litellm/config.yaml"
            - "--port"
            - "4000"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.litellm.anthropic.secretName }}
                  key: {{ .Values.litellm.anthropic.secretKey }}
            - name: LITELLM_MASTER_KEY
              value: {{ .Values.litellm.masterKey | default "" | quote }}
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "inhouse-ai.fullname" . }}-litellm-config
{{- end }}
