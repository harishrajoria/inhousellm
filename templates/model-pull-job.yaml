{{- if .Values.modelPullJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "inhouse-ai.fullname" . }}-model-pull
  labels:
    {{- include "inhouse-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: model-pull
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  {{- if .Values.modelPullJob.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.modelPullJob.ttlSecondsAfterFinished }}
  {{- end }}
  backoffLimit: {{ .Values.modelPullJob.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-pull
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: model-pull
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              OLLAMA_URL="http://{{ include "inhouse-ai.fullname" . }}-ollama:{{ .Values.ollama.service.port }}"
              echo "Waiting for Ollama to be ready..."
              until curl -sf "$OLLAMA_URL/" > /dev/null 2>&1; do
                echo "  Ollama not ready, retrying in 5s..."
                sleep 5
              done
              echo "Ollama is ready!"
              {{- range .Values.ollama.models }}
              echo "Pulling model: {{ . }}"
              curl -sf -X POST "$OLLAMA_URL/api/pull" \
                -H "Content-Type: application/json" \
                -d '{"name": "{{ . }}", "stream": false}' \
                --max-time 1800
              echo ""
              echo "Model {{ . }} pull complete."
              {{- end }}
              echo "All models pulled successfully."
{{- end }}
