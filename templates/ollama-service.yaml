apiVersion: v1
kind: Service
metadata:
  name: {{ include "inhouse-ai.fullname" . }}-ollama
  labels:
    {{- include "inhouse-ai.ollama.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ollama.service.type }}
  ports:
    - port: {{ .Values.ollama.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "inhouse-ai.ollama.selectorLabels" . | nindent 4 }}
